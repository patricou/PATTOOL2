# Modèle à COPIER vers application.properties (gitignoré sur ce dépôt).
# Ne mettez pas de secrets dans ce fichier exemple committé ; remplissez la copie locale.

# --- Serveur (facultatif)
# server.port=8080

# --- MongoDB (voir MongoConfig : uri OU host)
# spring.data.mongodb.uri=mongodb://localhost:27017/nombase
# spring.data.mongodb.host=
# spring.data.mongodb.port=27017
# spring.data.mongodb.database=rando

# --- Keycloak / OAuth2
# keycloak.auth-server-url=https://votre-keycloak/auth
# keycloak.realm=votre-realm
# keycloak.client-id=tutorial-frontend

# --- CORS (défaut déjà dans SecurityConfig si absent)
# app.cors.allowed-origins=http://localhost:4200,http://127.0.0.1:4200

# --- Mail (requis si MailController utilise ces clés)
# app.mailsentfrom=
# app.mailsentto=
# app.sendmail=false

# --- OpenAI (assistant, PatGPT chat, crédits billing)
# Affichage UI : openai.provider + openai.assistant.model sont aussi exposés via GET /api/assistant/config
openai.key=
# Libellé affiché côté client (panneau assistant)
openai.provider=OpenAI
openai.api=https://api.openai.com/v1/chat/completions
openai.assistant.model=gpt-5.5
openai.assistant.max-tokens=2000
openai.chat.max-tokens=2000
openai.billing.credit-grants-url=https://api.openai.com/v1/dashboard/billing/credit_grants
# Timeouts HTTP pour OpenAI uniquement (obligatoires : lus par RestTemplateConfig, sans défaut dans le Java).
# Augmentez read-timeout si « Read timed out » avec des modèles lents.
openai.http.connect-timeout-seconds=15
openai.http.read-timeout-seconds=300
