# Merge into application.properties as needed (local file is usually gitignored).

# -----------------------------------------------------------------------------
# PatTool assistant (/api/assistant/*)
# -----------------------------------------------------------------------------
# Server default routing: openai | anthropic | claude | gemini | google
assistant.provider=openai

# Assistant billing / usage links (sent to the client via GET /api/assistant/config).
# Google: adjust hl= and project= for your account and locale.
assistant.billing.openai-billing-url=https://platform.openai.com/settings/organization/billing
assistant.billing.openai-usage-url=https://platform.openai.com/usage
assistant.billing.anthropic-url=https://console.anthropic.com/settings/plans
assistant.billing.gemini-rate-limit-url=https://aistudio.google.com/rate-limit?timeRange=last-28-days&hl=fr&project=gen-lang-client-0509711942
assistant.billing.gemini-api-keys-url=https://aistudio.google.com/app/apikey

# --- Google Gemini (generateContent REST, Generative Language API) ---
# gemini.key: API key (Google AI Studio / Cloud)
gemini.key=
gemini.api=https://generativelanguage.googleapis.com/v1beta
gemini.model=gemini-2.0-flash
# Model used when the UI enables image generation (text + image, generateContent API).
gemini.image-generation-model=gemini-2.5-flash-image
gemini.max-output-tokens=8192
gemini.provider-label=Google
# anthropic.key: required for requests routed to Claude (from Anthropic Console)
anthropic.key=
anthropic.api=https://api.anthropic.com/v1/messages
anthropic.model=claude-sonnet-4-6
anthropic.max-tokens=8192
anthropic.provider-label=Anthropic
anthropic.version=2023-06-01
# Web search (Anthropic server tool). E.g. web_search_20250305 or web_search_20260209
anthropic.web-search-tool-type=web_search_20250305
# Max web searches per request (0 = API default)
anthropic.web-search-max-uses=0

# Assistant HTTP timeouts use the same properties as OpenAI (shared RestTemplate):
# openai.http.connect-timeout-seconds=15
# openai.http.read-timeout-seconds=300
