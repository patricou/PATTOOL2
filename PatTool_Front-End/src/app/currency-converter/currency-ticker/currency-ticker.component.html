<div class="currency-ticker" *ngIf="enabled" role="marquee" aria-label="Currency rate ticker">
    <div class="currency-ticker-label" aria-hidden="true">
        <i class="fa fa-money"></i>
        <span>{{ 'CURRENCY.TICKER_LABEL' | translate }}</span>
    </div>

    <div class="currency-ticker-rows">
        <div class="currency-ticker-loading" *ngIf="!hasQuotes()">
            <ng-container *ngIf="loading; else emptyTpl">
                <i class="fa fa-spinner fa-spin"></i>
                <span>{{ 'CURRENCY.TICKER_LOADING' | translate }}</span>
            </ng-container>
            <ng-template #emptyTpl>
                <i class="fa fa-info-circle"></i>
                <span>{{ 'CURRENCY.TICKER_EMPTY' | translate }}</span>
            </ng-template>
        </div>

        <ng-container *ngIf="hasQuotes()">
            <div class="currency-ticker-row">
                <div class="currency-ticker-track">
                    <ng-container *ngFor="let q of quotes; trackBy: trackByIndex">
                        <ng-container *ngTemplateOutlet="itemTpl; context: { $implicit: q, hidden: false }"></ng-container>
                    </ng-container>
                    <!-- Duplicate items for a seamless marquee loop (-50% translate). -->
                    <ng-container *ngFor="let q of quotes; trackBy: trackByIndex">
                        <ng-container *ngTemplateOutlet="itemTpl; context: { $implicit: q, hidden: true }"></ng-container>
                    </ng-container>
                </div>
            </div>

            <ng-template #itemTpl let-q let-hidden="hidden">
                <span class="currency-ticker-item"
                      [attr.aria-hidden]="hidden ? 'true' : null">
                    <span class="currency-pair">{{ q.base }}/{{ q.quote }}</span>
                    <span class="currency-rate">{{ formatRate(q) }}</span>
                    <span class="currency-variation" [ngClass]="variationClass(q)">
                        <span class="currency-arrow">{{ variationSymbol(q) }}</span>
                        {{ formatVariation(q) }}
                    </span>
                </span>
            </ng-template>
        </ng-container>
    </div>
</div>
