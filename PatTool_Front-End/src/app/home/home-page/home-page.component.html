<div>
    <div class="pat-display">
        <div>
            <!-- Sources are injected in ngAfterViewInit so the shell paints first; avoids competing with preload=auto on every navigation/refresh. -->
            <video #videoDesktop autoplay muted loop playsinline preload="none"
                id="pat-bg-video-desktop"
                class="d-none d-md-block fullscreen-video">
            </video>

            <!-- Video for smartphones (< 992px) -->
            <video #videoMobile autoplay muted loop playsinline preload="none"
                id="pat-bg-video-mobile"
                class="d-block d-md-none fullscreen-video">
            </video>
        </div>
        <div>
            <section>
                <div class="jumbotron pat-jumbotron enter-vertically">
                    <h3 class="text-center">{{"HOME.HOMETITLE" | translate }}</h3>
                    <p class="text-center">{{"HOME.HOMESUBTITLE" | translate }}</p>
                </div>
                <div class="banner">
                    <div class="container">
                        <h2 class="text-center pat-banner">{{"HOME.CITATION" | translate }}
                        </h2>
                        <!--        <p class="text-right">{{"HOME.AUTHOR" | translate }}</p>  -->
                    </div>
                </div>
                <small>v2</small>
            </section>
        </div>
    </div>
</div>
