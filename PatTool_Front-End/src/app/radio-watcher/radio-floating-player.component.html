<div
  class="radio-float"
  *ngIf="state.open"
  [class.radio-float--minimized]="state.minimized"
  [style.left.px]="posX"
  [style.top.px]="posY"
  [style.width.px]="state.minimized ? null : widthPx"
  [style.height.px]="state.minimized ? null : heightPx"
  role="dialog"
  [attr.aria-label]="'RADIO.FLOAT_TITLE' | translate">
  <div class="radio-float-header" (mousedown)="startDrag($event)">
    <div class="radio-float-title">
      <i class="fa fa-headphones me-1" aria-hidden="true"></i>
      <span class="radio-float-title-text">{{ station?.name || ('RADIO.FLOAT_TITLE' | translate) }}</span>
    </div>
    <div class="radio-float-actions">
      <button
        type="button"
        class="radio-float-btn"
        (click)="toggleMute()"
        [attr.title]="(isMuted ? 'RADIO.UNMUTE' : 'RADIO.MUTE') | translate">
        <i class="fa" [class.fa-volume-off]="isMuted || volumePercent === 0" [class.fa-volume-up]="!(isMuted || volumePercent === 0)"></i>
      </button>
      <label class="radio-float-vol-wrap">
        <input
          type="range"
          class="radio-float-vol-slider"
          min="0"
          max="100"
          step="1"
          [ngModel]="volumePercent"
          (ngModelChange)="onVolumeSlider($event)"
          [attr.aria-label]="'RADIO.VOLUME' | translate" />
      </label>
      <a
        routerLink="/tools/radio-watcher"
        class="radio-float-btn"
        [attr.title]="'RADIO.FLOAT_OPEN_PAGE' | translate">
        <i class="fa fa-external-link"></i>
      </a>
      <button
        type="button"
        class="radio-float-btn"
        *ngIf="!state.minimized"
        (click)="minimize()"
        [attr.title]="'RADIO.FLOAT_MINIMIZE' | translate">
        <i class="fa fa-minus"></i>
      </button>
      <button
        type="button"
        class="radio-float-btn"
        *ngIf="state.minimized"
        (click)="restore()"
        [attr.title]="'RADIO.FLOAT_RESTORE' | translate">
        <i class="fa fa-window-maximize"></i>
      </button>
      <button
        type="button"
        class="radio-float-btn radio-float-btn--close"
        (click)="close()"
        [attr.title]="'RADIO.FLOAT_CLOSE' | translate">
        <i class="fa fa-times"></i>
      </button>
    </div>
  </div>

  <div class="radio-float-body" *ngIf="!state.minimized">
    <div class="radio-float-video-wrap">
      <video
        #mediaEl
        class="radio-float-video radio-float-audio"
        playsinline
        (volumechange)="onMediaVolumeChange()"></video>
      <div class="radio-float-radio" *ngIf="station && !playError">
        <img
          *ngIf="station.logo"
          class="radio-float-radio-logo"
          [src]="station.logo"
          [alt]="station.name"
          (error)="$any($event.target).style.display='none'" />
        <div>{{ station.name }}</div>
      </div>
      <div class="radio-float-buffering" *ngIf="isBuffering && !playError">
        <i class="fa fa-spinner fa-spin me-1"></i>
        {{ 'RADIO.BUFFERING' | translate }}
      </div>
      <div class="radio-float-error" *ngIf="playError" role="alert">
        {{ formatPlayError(playError) }}
      </div>
    </div>
  </div>

  <ng-container *ngIf="!state.minimized">
    <div class="radio-float-resize radio-float-resize--n" (mousedown)="startResize('n', $event)"></div>
    <div class="radio-float-resize radio-float-resize--s" (mousedown)="startResize('s', $event)"></div>
    <div class="radio-float-resize radio-float-resize--e" (mousedown)="startResize('e', $event)"></div>
    <div class="radio-float-resize radio-float-resize--w" (mousedown)="startResize('w', $event)"></div>
    <div class="radio-float-resize radio-float-resize--ne" (mousedown)="startResize('ne', $event)"></div>
    <div class="radio-float-resize radio-float-resize--nw" (mousedown)="startResize('nw', $event)"></div>
    <div class="radio-float-resize radio-float-resize--se" (mousedown)="startResize('se', $event)"></div>
    <div class="radio-float-resize radio-float-resize--sw" (mousedown)="startResize('sw', $event)"></div>
  </ng-container>
</div>
