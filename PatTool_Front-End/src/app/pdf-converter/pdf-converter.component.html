<div class="pat-title">
  <h2>{{ 'PDF_CONVERTER.TITLE' | translate }}</h2>
</div>

<div class="container py-3 pdf-converter-page">
  <p class="text-muted">{{ 'PDF_CONVERTER.INTRO' | translate }}</p>

  <div class="card shadow-sm mb-3">
    <div class="card-body">
      <label class="form-label" for="pdfSavedDocs">{{
        'PDF_CONVERTER.SAVED_DOCS_LABEL' | translate
      }}</label>
      <div class="d-flex flex-wrap gap-2 align-items-center">
        <select
          id="pdfSavedDocs"
          class="form-select pdf-converter-doc-select"
          [disabled]="loadingDocuments"
          [ngModel]="currentDocumentId || ''"
          (ngModelChange)="onDocumentSelected($event)">
          <option value="">{{ 'PDF_CONVERTER.NEW_DOC' | translate }}</option>
          <option *ngFor="let doc of documents" [value]="doc.id ?? ''" [disabled]="!doc.id">
            {{ formatDocumentLabel(doc) }}
          </option>
        </select>
        <button
          type="button"
          class="btn btn-outline-primary btn-sm"
          (click)="newDocument()"
          [disabled]="loadingDocuments">
          <i class="fa fa-plus me-1" aria-hidden="true"></i>
          {{ 'PDF_CONVERTER.NEW_DOC' | translate }}
        </button>
        <button
          type="button"
          class="btn btn-outline-danger btn-sm"
          (click)="deleteDocument()"
          [disabled]="!hasSavedDocument || saving || deleting">
          <i class="fa fa-trash me-1" aria-hidden="true"></i>
          {{ 'PDF_CONVERTER.DELETE_DOC' | translate }}
        </button>
      </div>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label" for="pdfFileName">{{
          'PDF_CONVERTER.FILENAME_LABEL' | translate
        }}</label>
        <div class="input-group">
          <input
            id="pdfFileName"
            type="text"
            class="form-control"
            [(ngModel)]="pdfFileName"
            [placeholder]="'PDF_CONVERTER.FILENAME_PLACEHOLDER' | translate"
            [attr.aria-describedby]="'pdfFileNameHint'"
            maxlength="180"
            autocomplete="off"
            spellcheck="false" />
          <span class="input-group-text">.pdf</span>
        </div>
        <div id="pdfFileNameHint" class="form-text">
          {{ 'PDF_CONVERTER.FILENAME_HINT' | translate }}
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label d-block">{{
          'PDF_CONVERTER.TEXT_LABEL' | translate
        }}</label>
        <input
          #quillImageInput
          type="file"
          class="d-none"
          accept="image/*"
          (change)="onQuillImageSelected($event)" />
        <div class="pdf-converter-image-actions mb-2 d-flex flex-wrap gap-2">
          <button
            type="button"
            class="btn btn-outline-secondary btn-sm"
            (click)="triggerQuillImagePicker()">
            <i class="fa fa-image me-1" aria-hidden="true"></i>
            {{ 'PDF_CONVERTER.ADD_IMAGES' | translate }}
          </button>
          <button
            type="button"
            class="btn btn-outline-danger btn-sm"
            [disabled]="!hasSelectedImage"
            (click)="removeSelectedImage()">
            <i class="fa fa-trash me-1" aria-hidden="true"></i>
            {{ 'PDF_CONVERTER.REMOVE_IMAGE' | translate }}
          </button>
        </div>
        <div class="pdf-converter-editor-wrap">
          <quill-editor
            [(ngModel)]="htmlContent"
            [modules]="quillModules"
            [placeholder]="'PDF_CONVERTER.TEXT_PLACEHOLDER' | translate"
            [styles]="{ minHeight: '320px' }"
            (onEditorCreated)="onEditorCreated($event)"
            class="pdf-converter-quill">
          </quill-editor>
        </div>
        <div class="form-text">{{ 'PDF_CONVERTER.EDITOR_HINT' | translate }}</div>
      </div>

      <div *ngIf="errorKey" class="alert alert-danger py-2 px-3 small" role="alert">
        {{ errorKey | translate }}
      </div>
      <div *ngIf="saveMessageKey" class="alert alert-success py-2 px-3 small" role="status">
        {{ saveMessageKey | translate }}
      </div>
      <div *ngIf="shareMessageKey" class="alert alert-info py-2 px-3 small" role="status">
        {{ shareMessageKey | translate }}
      </div>

      <div class="form-check form-switch mb-3">
        <input
          id="pdfShowFooter"
          class="form-check-input"
          type="checkbox"
          role="switch"
          [(ngModel)]="showPdfFooter"
          [disabled]="isBusy" />
        <label class="form-check-label" for="pdfShowFooter">
          {{ 'PDF_CONVERTER.FOOTER_SWITCH' | translate }}
        </label>
      </div>

      <div class="pdf-converter-actions d-flex gap-1 gap-sm-2">
        <button
          type="button"
          class="btn btn-success btn-sm pdf-converter-action-btn"
          [disabled]="!canSave"
          (click)="saveDocument()">
          <span
            *ngIf="saving"
            class="spinner-border spinner-border-sm me-1"
            role="status"
            aria-hidden="true"></span>
          <i *ngIf="!saving" class="fa fa-save me-1" aria-hidden="true"></i>
          <span class="pdf-converter-action-label pdf-converter-action-label--long">{{
            'PDF_CONVERTER.SAVE_BTN' | translate
          }}</span>
          <span class="pdf-converter-action-label pdf-converter-action-label--short">{{
            'PDF_CONVERTER.SAVE_BTN_SHORT' | translate
          }}</span>
        </button>
        <button
          type="button"
          class="btn btn-primary btn-sm pdf-converter-action-btn"
          [disabled]="!canGenerate"
          (click)="generatePdf()">
          <span
            *ngIf="exporting"
            class="spinner-border spinner-border-sm me-1"
            role="status"
            aria-hidden="true"></span>
          <i *ngIf="!exporting" class="fa fa-file-pdf-o me-1" aria-hidden="true"></i>
          <span class="pdf-converter-action-label pdf-converter-action-label--long">{{
            'PDF_CONVERTER.GENERATE_BTN' | translate
          }}</span>
          <span class="pdf-converter-action-label pdf-converter-action-label--short">{{
            'PDF_CONVERTER.GENERATE_BTN_SHORT' | translate
          }}</span>
        </button>
        <button
          type="button"
          class="btn btn-success btn-sm pdf-converter-action-btn pdf-converter-whatsapp-btn"
          [disabled]="!canGenerate"
          [title]="'PDF_CONVERTER.SHARE_WHATSAPP_HINT' | translate"
          (click)="sharePdfOnWhatsApp()">
          <span
            *ngIf="sharingWhatsApp"
            class="spinner-border spinner-border-sm me-1"
            role="status"
            aria-hidden="true"></span>
          <i *ngIf="!sharingWhatsApp" class="fa fa-whatsapp me-1" aria-hidden="true"></i>
          {{ 'PDF_CONVERTER.SHARE_WHATSAPP_BTN' | translate }}
        </button>
        <button
          type="button"
          class="btn btn-outline-secondary btn-sm pdf-converter-action-btn"
          [disabled]="isBusy || saving"
          (click)="clearAll()">
          <span class="pdf-converter-action-label pdf-converter-action-label--long">{{
            'PDF_CONVERTER.CLEAR_BTN' | translate
          }}</span>
          <span class="pdf-converter-action-label pdf-converter-action-label--short">{{
            'PDF_CONVERTER.CLEAR_BTN_SHORT' | translate
          }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
