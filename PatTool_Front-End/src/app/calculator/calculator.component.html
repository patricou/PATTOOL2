<!-- Même structure que currency-converter / openweathermap : .pat-title plein cadre global, puis contenu -->
<div class="pat-title">
  <h2>
    {{ 'CALCULATOR.TITLE' | translate }}
  </h2>
</div>

<div
  class="calculator-viewport-root calculator-theme-dark"
  [class.calculator-layout--scientific]="scientificMode">
<div
  #calcPanel
  class="calculator-page container"
  [class.pb-lg-4]="!scientificMode"
  [class.calculator-page--scientific-inner]="scientificMode"
  tabindex="0"
  (keydown)="onKeydown($event)"
  [attr.aria-label]="'CALCULATOR.PANEL_ARIA' | translate">
  <div class="row justify-content-center gx-2 calculator-page-row flex-grow-1 min-h-0">
    <div class="col-12 col-lg-11 col-xxl-10 d-flex flex-column min-h-0">
      <div class="card shadow-sm calculator-card flex-grow-1 min-h-0 d-flex flex-column">
        <div
          class="card-body calculator-card-inner d-flex flex-column min-h-0"
          [class.calculator-card-inner--sci]="scientificMode">
          <div
            class="d-flex flex-wrap align-items-center calculator-toggle-row mb-2"
            [class.gap-lg-4]="!scientificMode"
            [class.gap-2]="scientificMode"
            [class.mb-lg-3]="!scientificMode"
            [class.mb-2]="scientificMode">
            <div class="form-check form-switch calculator-tape-toggle mb-0">
              <input
                class="form-check-input"
                type="checkbox"
                id="calcTapeMode"
                [(ngModel)]="tapeMode" />
              <label class="form-check-label" for="calcTapeMode">{{
                'CALCULATOR.TAPE_MODE_LABEL' | translate
              }}</label>
            </div>
            <div class="form-check form-switch calculator-tape-toggle mb-0">
              <input
                class="form-check-input"
                type="checkbox"
                id="calcScientificMode"
                [(ngModel)]="scientificMode" />
              <label class="form-check-label" for="calcScientificMode">{{
                'CALCULATOR.SCIENTIFIC_MODE_LABEL' | translate
              }}</label>
            </div>
          </div>

          <div
            *ngIf="tapeMode"
            #tapeScroll
            class="calculator-tape calculator-tape--scroll shrink-0 mb-2"
            role="log"
            (pointerdown)="refocusKeyboardPanel()"
            [attr.aria-label]="'CALCULATOR.TAPE_ARIA' | translate">
            <div *ngIf="tapeLines.length === 0" class="calculator-tape-placeholder text-muted">
              {{ 'CALCULATOR.TAPE_EMPTY' | translate }}
            </div>
            <div *ngFor="let line of tapeLines" class="calculator-tape-line">{{ line }}</div>
          </div>

          <div
            class="calculator-display calculator-display--adapt shrink-0 mb-2"
            role="status"
            (pointerdown)="refocusKeyboardPanel()"
            [attr.aria-live]="'polite'"
            [attr.aria-label]="'CALCULATOR.DISPLAY_ARIA' | translate">
            {{ display }}
          </div>

          <div
            *ngIf="scientificMode"
            class="calculator-sci-keys d-grid gap-1 shrink-0 mb-2"
            [attr.title]="'CALCULATOR.SCIENTIFIC_ANGLES_HINT' | translate">
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row calculator-sci-deg-row">
              <div class="col-12">
                <div class="form-check form-switch mb-0 d-flex align-items-center justify-content-center flex-wrap gap-2">
                  <input
                    class="form-check-input flex-shrink-0"
                    type="checkbox"
                    id="calcSciDeg"
                    [(ngModel)]="sciUseDegrees" />
                  <label class="form-check-label small mb-0" for="calcSciDeg">{{
                    'CALCULATOR.SCI_DEGREES_TOGGLE' | translate
                  }}</label>
                </div>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('sin')">
                  sin
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('cos')">
                  cos
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('tan')">
                  tan
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_LOG10_TITLE' | translate"
                  (click)="scientificUnary('log10')">
                  log
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('asin')">
                  asin
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('acos')">
                  acos
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('atan')">
                  atan
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('ln')">
                  ln
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('sinh')">
                  sinh
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('cosh')">
                  cosh
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('tanh')">
                  tanh
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_LOG2' | translate"
                  (click)="scientificUnary('log2')">
                  log₂
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  (click)="scientificUnary('sqrt')">
                  √
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_SQUARE_TITLE' | translate"
                  (click)="scientificUnary('square')">
                  x²
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_CUBE' | translate"
                  (click)="scientificUnary('cube')">
                  x³
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_CBRT' | translate"
                  (click)="scientificUnary('cbrt')">
                  ∛
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_INV_TITLE' | translate"
                  (click)="scientificUnary('inv')">
                  1/x
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_EXP' | translate"
                  (click)="scientificUnary('exp')">
                  eˣ
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_EXP10' | translate"
                  (click)="scientificUnary('exp10')">
                  10ˣ
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_ABS' | translate"
                  (click)="scientificUnary('abs')">
                  |x|
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row">
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_FACT' | translate"
                  (click)="scientificUnary('fact')">
                  n!
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_POW' | translate"
                  (click)="operator('^')">
                  xʸ
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-info w-100 calculator-btn calculator-btn-sci"
                  [attr.title]="'CALCULATOR.SCI_TITLE_MOD' | translate"
                  (click)="operator('mod')">
                  mod
                </button>
              </div>
              <div class="col-3">
                <button
                  type="button"
                  class="btn btn-outline-secondary w-100 calculator-btn calculator-btn-sci"
                  (click)="insertConstant('pi')">
                  π
                </button>
              </div>
            </div>
            <div class="row g-2 gx-2 gy-2 calculator-sci-key-row calculator-sci-key-row--constants">
              <div class="col-12">
                <button
                  type="button"
                  class="btn btn-outline-secondary w-100 calculator-btn calculator-btn-sci"
                  (click)="insertConstant('e')">
                  e
                </button>
              </div>
            </div>
          </div>

          <div
            class="calculator-keys d-grid flex-grow-1 min-h-0"
            [class.gap-2]="!scientificMode"
            [class.gap-1]="scientificMode"
            [class.calculator-keys--sci]="scientificMode">
            <div class="row g-2 calculator-key-row-main">
              <div class="col-3">
                <button type="button" class="btn btn-outline-secondary w-100 calculator-btn" (click)="clearAll()">
                  {{ 'CALCULATOR.C' | translate }}
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-outline-secondary w-100 calculator-btn" (click)="clearEntry()">
                  {{ 'CALCULATOR.CE' | translate }}
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-outline-secondary w-100 calculator-btn" (click)="backspace()" [attr.aria-label]="'CALCULATOR.BACKSPACE' | translate">
                  ⌫
                </button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-outline-warning w-100 calculator-btn" (click)="operator('/')">
                  ÷
                </button>
              </div>
            </div>

            <div class="row g-2">
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('7')">7</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('8')">8</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('9')">9</button></div>
              <div class="col-3"><button type="button" class="btn btn-outline-warning w-100 calculator-btn" (click)="operator('*')">×</button></div>
            </div>

            <div class="row g-2">
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('4')">4</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('5')">5</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('6')">6</button></div>
              <div class="col-3"><button type="button" class="btn btn-outline-warning w-100 calculator-btn" (click)="operator('-')">−</button></div>
            </div>

            <div class="row g-2">
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('1')">1</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('2')">2</button></div>
              <div class="col-3"><button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('3')">3</button></div>
              <div class="col-3"><button type="button" class="btn btn-outline-warning w-100 calculator-btn" (click)="operator('+')">+</button></div>
            </div>

            <div class="d-flex gap-2 calculator-row-bottom">
              <div class="flex-fill min-w-0">
                <button type="button" class="btn btn-outline-secondary w-100 calculator-btn" (click)="toggleSign()">
                  ±
                </button>
              </div>
              <div class="flex-fill min-w-0">
                <button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('0')">0</button>
              </div>
              <div class="flex-fill min-w-0">
                <button type="button" class="btn btn-light border w-100 calculator-btn" (click)="digit('.')">.</button>
              </div>
              <div class="flex-fill min-w-0">
                <button type="button" class="btn btn-primary w-100 calculator-btn calculator-btn-eq" (click)="equals()">=</button>
              </div>
              <div class="flex-fill min-w-0">
                <button type="button" class="btn btn-outline-secondary w-100 calculator-btn" (click)="percent()">%</button>
              </div>
            </div>
          </div>

          <p class="text-muted small mb-0" [class.mt-3]="!scientificMode" [class.mt-2]="scientificMode" [class.d-none]="scientificMode">
            {{ 'CALCULATOR.KEYBOARD_HINT' | translate }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
